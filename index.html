<!DOCTYPE html>
<html>
<head>
<title>Studiq - Ultimate Study Platform</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #020617);
  color: white;
  overflow-x: hidden;
}

/* Navigation */
nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}
.active { display: block; }

.box {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
}

textarea, input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}

button.main {
  margin-top: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome & Study</h1>

<p style="text-align:center;">
"to be is to do" — zak123monkey
</p>

<!-- 🔥 VISITOR COUNTER -->
<p style="text-align:center; font-size:18px;">
👀 Visitors: <span id="visits">Loading...</span>
</p>

<div class="box">
<p>
Welcome to Studiq — your all-in-one study system designed to help students focus better.
</p>
</div>
</div>

<!-- TIMER -->
<div id="timer" class="page">
<div class="box">
<h2>⏱️ Study Timer</h2>
<input id="mins" placeholder="Enter minutes">
<button class="main" onclick="startTimer()">Start Timer</button>
<h1 id="time">00:00</h1>
</div>
</div>

<!-- SUMMARIZER -->
<div id="notes" class="page">
<div class="box">
<h2>🧠 Smart Summarizer</h2>
<textarea id="text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<div id="result"></div>
</div>
</div>

<!-- PLANNER -->
<div id="planner" class="page">
<div class="box">
<h2>📅 Study Planner</h2>
<textarea id="plan"></textarea>
<button class="main" onclick="makePlan()">Generate Plan</button>
<div id="planOut"></div>
</div>
</div>

<!-- TOOLS -->
<div id="tools" class="page">
<div class="box">
<h3>💬 Motivation</h3>
<button onclick="quote()">Get Motivation</button>
<p id="quote"></p>
</div>
</div>

<script>

/* NAV */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* TIMER */
let t,int;
function startTimer(){
  let m=document.getElementById("mins").value;
  t=m*60;
  clearInterval(int);
  int=setInterval(()=>{
    let min=Math.floor(t/60);
    let sec=t%60;
    document.getElementById("time").innerText=min+":"+(sec<10?"0":"")+sec;
    t--;
  },1000);
}

/* SUMMARIZER */
function summarize(){
  let text=document.getElementById("text").value;
  let sentences=text.split(".");
  let summary=sentences.slice(0,3).join(".");
  document.getElementById("result").innerHTML=summary;
}

/* PLANNER */
function makePlan(){
  let t=document.getElementById("plan").value.split(",");
  let out="";
  t.forEach((d,i)=>{out+="Day "+(i+1)+": "+d+"<br>";});
  document.getElementById("planOut").innerHTML=out;
}

/* MOTIVATION */
let quotes=[
"Stay focused and never give up",
"Small progress is still progress",
"Discipline beats motivation",
"Consistency creates success"
];

function quote(){
  document.getElementById("quote").innerText=
  quotes[Math.floor(Math.random()*quotes.length)];
}

/* 🔥 REAL GLOBAL COUNTER */
fetch("https://api.countapi.xyz/hit/studiq-global/visits")
.then(res=>res.json())
.then(data=>{
  document.getElementById("visits").innerText=data.value;
});

</script>

</body>
</html>
