<!DOCTYPE html>
<html>
<head>
<title>Studiq - Addictive Version</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
  background: linear-gradient(135deg,#020617,#1e3a8a,#0f172a);
  color:white;
}

/* STRONGER DRAGON PATTERN BORDER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  border:20px solid transparent;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><text x="10" y="80" font-size="70" fill="rgba(255,255,255,0.06)">🐉</text></svg>');
  pointer-events:none;
}

nav{
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:rgba(0,0,0,0.5);
}

nav button{
  background:none;border:none;color:#ccc;font-size:16px;cursor:pointer
}
nav button:hover{color:#fff}

.page{display:none;padding:40px;max-width:1000px;margin:auto}
.active{display:block}

.box{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:20px;
  margin-top:20px;
}

button.main{
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

textarea,input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}
#time{font-size:40px;margin-top:10px}

</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
<button onclick="showPage('game')">Game</button>
</nav>

<div id="home" class="page active">
<h1>Studiq</h1>
<p>Level up your studying 🔥</p>

<div class="box">
<h3>👥 Visitors</h3>
<img src="https://api.visitorbadge.io/api/visitors?path=studiq&label=Users&countColor=%233b82f6" />
</div>

<div class="box">
<h3>🔥 Daily Quote</h3>
<p id="quote"></p>
<button class="main" onclick="quote()">New Quote</button>
</div>

<div class="box">
<h3>🏆 Your Streak</h3>
<p id="streak"></p>
<button class="main" onclick="increaseStreak()">Mark Study Done</button>
</div>
</div>

<div id="timer" class="page">
<div class="box">
<h2>⏱ Timer</h2>
<input id="mins" placeholder="Minutes">
<button class="main" onclick="startTimer()">Start</button>
<h1 id="time">00:00</h1>
</div>
</div>

<div id="notes" class="page">
<div class="box">
<h2>🧠 Summarizer</h2>
<textarea id="text" placeholder="Paste text"></textarea>
<button class="main" onclick="summarize()">Summarize</button>
<p id="result"></p>
</div>
</div>

<div id="planner" class="page">
<div class="box">
<h2>📅 Planner</h2>
<textarea id="plan" placeholder="Math, Science"></textarea>
<button class="main" onclick="makePlan()">Generate</button>
<div id="planOut"></div>
</div>
</div>

<div id="tools" class="page">
<div class="box">
<h3>📋 Tasks</h3>
<input id="taskInput" placeholder="Add task">
<button class="main" onclick="addTask()">Add</button>
<ul id="tasks"></ul>
</div>

<div class="box">
<h3>🎯 Goal</h3>
<input id="goalInput" placeholder="Your goal">
<button class="main" onclick="setGoal()">Save Goal</button>
<p id="goal"></p>
</div>
</div>

<div id="game" class="page">
<div class="box">
<h2>🎮 Pac-Man</h2>
<canvas id="gameCanvas" width="300" height="300"></canvas>
<p>Score: <span id="score">0</span></p>
</div>
</div>

<script>
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// TIMER
let t,int;
function startTimer(){
 let m=document.getElementById('mins').value;
 t=m*60;
 clearInterval(int);
 int=setInterval(()=>{
  let min=Math.floor(t/60);
  let sec=t%60;
  document.getElementById('time').innerText=min+":"+(sec<10?"0":"")+sec;
  t--;
 },1000);
}

// QUOTES
let quotes=["Stay focused","Win the day","Discipline wins","No excuses"];
function quote(){
 document.getElementById('quote').innerText=quotes[Math.floor(Math.random()*quotes.length)];
}
quote();

// STREAK SYSTEM (ADDICTIVE)
let streak=localStorage.getItem('streak')||0;
function updateStreak(){document.getElementById('streak').innerText=streak+" days"}
function increaseStreak(){streak++;localStorage.setItem('streak',streak);updateStreak()}
updateStreak();

// SUMMARIZER
function summarize(){
 let text=document.getElementById('text').value;
 let s=text.split('.');
 document.getElementById('result').innerText=s.slice(0,3).join('.')+'.';
}

// PLANNER
function makePlan(){
 let t=document.getElementById('plan').value.split(',');
 let out="";
 t.forEach((d,i)=> out+="Day "+(i+1)+": "+d+"\n");
 document.getElementById('planOut').innerText=out;
}

// TASKS
let tasks=JSON.parse(localStorage.getItem('tasks'))||[];
function render(){
 let list=document.getElementById('tasks');
 list.innerHTML="";
 tasks.forEach((t,i)=>{
  list.innerHTML+=`<li>${t} <button onclick="del(${i})">X</button></li>`;
 });
}
function addTask(){
 let t=document.getElementById('taskInput').value;
 tasks.push(t);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 render();
}
function del(i){
 tasks.splice(i,1);
 localStorage.setItem('tasks',JSON.stringify(tasks));
 render();
}
render();

// GOAL
function setGoal(){
 let g=document.getElementById('goalInput').value;
 localStorage.setItem('goal',g);
 document.getElementById('goal').innerText=g;
}

// PACMAN + SCORE
let c=document.getElementById('gameCanvas');
let ctx=c.getContext('2d');
let x=150, score=0;
document.addEventListener('keydown',e=>{
 if(e.key==='ArrowLeft'){x-=10;score++}
 if(e.key==='ArrowRight'){x+=10;score++}
 document.getElementById('score').innerText=score;
});
function draw(){
 ctx.clearRect(0,0,300,300);
 ctx.beginPath();
 ctx.arc(x,150,20,0.2*Math.PI,1.8*Math.PI);
 ctx.lineTo(x,150);
 ctx.fillStyle='yellow';
 ctx.fill();
 requestAnimationFrame(draw);
}
draw();
</script>

<script>
var sc_project=13212872; 
var sc_invisible=1; 
var sc_security="14c16a4e"; 
</script>
<script src="https://www.statcounter.com/counter/counter.js" async></script>

</body>
</html>
