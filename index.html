<!DOCTYPE html>
<html>
<head>
<title>Studiq</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0f2c, #1a0f2e, #2a0d1f);
  color: white;
  text-align: center;
}

nav {
  background: rgba(0,0,0,0.5);
  padding: 10px;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('tools')">Tools</button>
  <button onclick="show('games')">Games</button>
</nav>

<div id="home">
  <h1>Studiq</h1>
  <p>Study smarter, not harder.</p>
</div>

<div id="tools" style="display:none;">
  <h2>Summarizer</h2>
  <textarea id="notes"></textarea><br>
  <button onclick="summarize()">Summarize</button>
  <p id="summary"></p>
</div>

<div id="games" style="display:none;">
  <h2>Game</h2>
  <button onclick="clickGame()">Click me</button>
  <p id="score">Score: 0</p>
</div>

<script>
function show(id) {
  document.getElementById("home").style.display = "none";
  document.getElementById("tools").style.display = "none";
  document.getElementById("games").style.display = "none";
  document.getElementById(id).style.display = "block";
}

function summarize() {
  let text = document.getElementById("notes").value;
  document.getElementById("summary").innerText = text.slice(0, 50) + "...";
}

let score = 0;
function clickGame() {
  score++;
  document.getElementById("score").innerText = "Score: " + score;
}
</script>

</body>
</html>
