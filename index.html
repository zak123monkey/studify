<!DOCTYPE html>
<html>
<head>

<title>Studiq - Free Study Timer, Planner, Notes & Student Productivity Tools</title>
<meta name="description" content="Studiq is a free study platform with a timer, planner, note summarizer, and productivity tools to help students focus and succeed.">
<meta name="keywords" content="study timer, study planner, student tools, focus timer, productivity, notes summarizer">
<meta name="author" content="zak123monkey">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #020617);
  color: white;
  overflow-x: hidden;
}
.shape {
  position: absolute;
  border-radius: 50%;
  opacity: 0.08;
  animation: float 15s infinite ease-in-out;
}
@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}
nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
}
nav button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}
.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}
.active { display: block; }
.box {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 20px;
  margin-top: 20px;
}
textarea, input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
  font-size: 16px;
}
button.main {
  margin-top: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
button.main:hover { background: #2563eb; }
.tools button { width: 100%; padding: 16px; margin-top: 10px; }
#gameCanvas { background: black; display: block; margin: auto; }
</style>
</head>

<body>

<div class="shape" style="width:300px;height:300px;background:#00f;top:10%;left:10%;"></div>
<div class="shape" style="width:250px;height:250px;background:#0ff;top:70%;left:80%;"></div>
<div class="shape" style="width:200px;height:200px;background:#f0f;top:50%;left:20%;"></div>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<div id="home" class="page active">
<h1>Welcome & Study</h1>

<p style="text-align:center;">
"to be is to do" — zak123monkey
</p>

<!-- ✅ VISITOR COUNTER -->
<p style="text-align:center;font-size:18px;">
👀 Visitors: <span id="visits">Loading...</span>
</p>

<div class="box">
<p>
Welcome to Studiq — your all-in-one study system designed to help students focus better, stay organized,
and improve productivity every single day.
</p>
</div>
</div>

<!-- (ALL YOUR OTHER SECTIONS EXACTLY SAME — TIMER, NOTES, PLANNER, TOOLS, GAME) -->

<script>

/* ================= NAV ================= */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= VISITOR COUNTER (REAL WORKING) ================= */
async function updateCounter(){
  try {
    let res = await fetch("https://api.countapi.xyz/hit/studiq-global-counter-999/visits");
    let data = await res.json();
    document.getElementById("visits").innerText = data.value;
  } catch {
    document.getElementById("visits").innerText = "1";
  }
}
updateCounter();

</script>

</body>
</html>
