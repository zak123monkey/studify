<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studify</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', Arial, sans-serif;
  background: linear-gradient(135deg, #2c003e, #5a0f4d, #a83279, #ff6a3d);
  color: white;
}

nav {
  display: flex;
  justify-content: space-around;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.page {
  display: none;
  padding: 40px;
  max-width: 1000px;
  margin: auto;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.page.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  margin-top: 20px;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

textarea, input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

button:active {
  transform: scale(0.96);
}

button.main {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}

#time {
  font-size: 48px;
  text-align: center;
  margin-top: 15px;
}

.progress {
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.3s linear;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 10px;
  display: none;
}

/* GAME */
#gameCanvas {
  background: linear-gradient(#4facfe,#00f2fe);
  display: block;
  margin: auto;
}

#gameUI {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:24px;
}

</style>
</head>

<body>

<nav>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('timer')">Timer</button>
<button onclick="showPage('notes')">Summarizer</button>
<button onclick="showPage('planner')">Planner</button>
<button onclick="showPage('tools')">Tools</button>
</nav>

<!-- HOME -->
<div id="home" class="page active">
<h1>Welcome to Studify</h1>
<p style="text-align:center; opacity:0.8;">Your all-in-one study system</p>

<div class="box">
<h2>📊 Dashboard</h2>
<p>🔥 Streak: <span id="dashStreak">0</span></p>
<p>📋 Tasks: <span id="taskCount">0</span></p>
<p>🎯 Goal: <span id="dashGoal">None</span></p>
<button class="main" onclick="showPage('timer')">▶ Start Study Session</button>
</div>

<div class="box">
<p>All-in-one study system to help you focus and improve daily.</p>
</div>

<div class="box" style="text-align:center;">
<h3>⚠️ Found a problem?</h3>
<a href="mailto:zmal4525@gmail.com">📩 Email Support</a>
</div>
</div>
